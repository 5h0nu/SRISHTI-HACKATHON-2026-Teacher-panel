<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Panel - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div id="toast" class="toast"></div>

    <div class="login-container">
        <div class="login-box glass-effect">
            <div class="login-header">
                <div class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                <h2>Teacher Portal</h2>
                <p>Sign in to manage your students</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Teacher Email" required autocomplete="email">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" id="login-btn">
                    <span class="btn-text">Sign In</span>
                    <div class="spinner hidden"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
                </button>
            </form>
            <div class="login-footer">
                <p>Demo Credentials: teacher@demo.com / 123456</p>
            </div>
        </div>
        <!-- Decorative elements -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
